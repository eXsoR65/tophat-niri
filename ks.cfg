######################################
## Minimal Fedora Install Kickstart ##
## change settings accordingly      ##
######################################

# -- Lang and Keyboard settings --#
lang en_US.UTF-8
keyboard --vckeymap=us --xlayouts='us'

# -- System timezone -- #
timezone --utc America/New_York

# -- Network -- #
# change hostname
network --bootproto=dhcp --device=link --noipv6 --hostname=fedora

# -- Firewall and SELinux -- #
firewall --disabled
selinux --permissive

# -- Packages -- #
# Currently configured for a minimal install.
%packages
@core
openssh-server
plymouth-system-theme
dnf-utils
pciutils
usbutils
vim
git
curl

%end

# -- Partitioning -- #
# Note currently set to use nvmeon1 you will need to change this if that is not the case.
# Partitioning is currently set to autopart with btrfs and with LUKs encryption and will prompt for a passphrase.
text
clearpart --all --initlabel --drives=nvme0n1
autopart --encrypted --passphrase "" --type btrfs --nohome
zerombr
shutdown # once the automated install is done it will shutdown

# -- User Accounts -- #
#root account disabled
rootpw --lock 

#Replace UserName with the user name and password.
user --name=UserName --groups=wheel --gecos="Full Name" --password="ChangeMe123" --plaintext

# SSH Keys replace "Your_Public_SSH_Key" with your ssh key between double quotes.
sshkey --username UserName "Your_Public_SSH_Key"


# -- Pre-Installation -- #
%pre --log=/var/log/ks-pre.log

# Tune DNF for faster downloads
cat > /etc/dnf/dnf.conf << 'EOF'
[main]
max_parallel_downloads=10
fastestmirror=True
defaultyes=True
keepcache=False
EOF

%end

# -- Post-Installation -- #
%post --log=/var/log/ks-post.log

# Set plymouth theme to bgrt Graphical boot.
plymouth-set-default-theme -R bgrt

# Configure SSHD for key-only authentication (hardening)
mkdir -p /etc/ssh/sshd_config.d

cat > /etc/ssh/sshd_config.d/70-no-password-login.conf << 'EOF'
PasswordAuthentication no
PermitEmptyPasswords no
ChallengeResponseAuthentication no
PubkeyAuthentication yes
AuthorizedKeysFile .ssh/authorized_keys
EOF

# Remove leftover kickstart artifacts
rm -f /root/anaconda-ks.cfg /root/original-ks.cfg

%end