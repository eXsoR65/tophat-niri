name: CI

on:
  pull_request:
  push:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  shell:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shell tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck shfmt

      - name: Bash syntax
        run: |
          find . -type f -name '*.sh' -print0 | xargs -0 -n1 bash -n
          bash -n install.sh

      - name: ShellCheck
        run: |
          shellcheck install.sh lib/**/*.sh tests/**/*.sh kickstart/*.sh

      - name: Formatting
        run: |
          shfmt -d -i 2 -ci install.sh lib tests kickstart

      - name: Kickstart validation
        run: |
          kickstart/validate-kickstart.sh

      - name: Tests
        run: |
          tests/helpers_test.sh
